send_raw:
  name: Send raw frame
  description: Send one debug Portisch B0 frame through a specific online bridge.
  fields:
    bridge:
      name: Bridge
      description: Bridge ID from the rf433/<bridge>/info topic.
      required: true
      example: rf433-bridge-living-room
      selector:
        text:
    raw:
      name: Raw B0
      description: Complete AAB0...55 hexadecimal frame.
      required: true
      selector:
        text:
          multiline: true
    repeats:
      name: Repeats
      description: How many times the frame is transmitted (distant or obstructed blinds may need more).
      default: 5
      selector:
        number:
          min: 1
          max: 20
          mode: box

# supports_response is declared in code (SupportsResponse.ONLY: callers must
# request the response); hassfest rejects it as a services.yaml key.
new_virtual_remote:
  name: Allocate virtual remote
  description: >-
    Generate an unused remote identity with a complete synthesized calibration.
    The response's prefix, remote ID, and UP base go straight into the manual
    add-integration flow; pair the motor by sending OPEN while it is in its
    RF pairing mode.

