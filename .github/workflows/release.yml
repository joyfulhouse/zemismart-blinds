name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Attach integration zip to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create integration zip
        run: |
          cd custom_components/zemismart_blinds
          zip -r ../../zemismart_blinds.zip .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: zemismart_blinds.zip
